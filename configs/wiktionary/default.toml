dataset_id = "enwiktionary-2026-06-01-v0"
dump_index_url = "https://dumps.wikimedia.org/other/mediawiki_content_current/enwiktionary/2026-06-01/xml/bzip2/"
train_frac = 0.8
valid_frac = 0.1
seed = 777
languages = ["eng", "fra", "deu", "spa"]

# Train all pronunciation tasks generated by this config:
# - spelling -> IPA
# - IPA/phonetic transcription -> spelling
# - orthography -> language
# - IPA/phonetic transcription -> language
# - orthography + IPA/phonetic transcription -> language
train_task = "all"

# Include slash-delimited phonemic rows from phonemes.jsonl and
# bracket-delimited phonetic rows from phones.jsonl.
train_notations = ["phonemic", "phonetic"]
include_reverse = true
include_language_guessing = true

# Add Castilian and standard Latin American Spanish rows from Spanish page titles
# by applying regular Spanish orthography-to-IPA rules.
synthesize_spanish = true

# Set this to avoid scanning the dump index, or to pin a specific dump file.
# dump_file_url = "https://dumps.wikimedia.org/other/mediawiki_content_current/enwiktionary/2026-06-01/xml/bzip2/enwiktionary-2026-06-01-p6p11719661.xml.bz2"

