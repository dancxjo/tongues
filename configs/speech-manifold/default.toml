dataset_id = "openepd-synth-v0"
train_frac = 0.8
valid_frac = 0.1
seed = 42
tasks = [
  "spelling-to-ipa",
  "ipa-to-spelling",
  "ipa-to-phones",
  "stress",
  "syllables",
  "acoustic-to-ipa",
  "ipa-to-acoustic",
]
synthesis_backends = ["espeak-ng", "google-translate", "wiktionary-audio", "wikimedia-commons-audio", "anyspeak", "styletts2", "piper", "mock"]
allow_placeholder_acoustics = true
max_examples = 5000
max_audio_examples_per_backend = 64
max_espeak_examples = 64
max_google_translate_examples = 64
max_wiktionary_audio_examples = 32
max_wikimedia_commons_examples = 32
max_wikimedia_commons_lookup_attempts = 256
max_styletts2_examples = 16
max_piper_examples = 32
max_anyspeak_examples = 16
max_mock_examples = 64
anyspeak_dir = ""
anyspeak_python = "python3"
anyspeak_voice_tags = ["[RYAN]", "[VIVIAN]", "[AUTO]"]
include_reference_uris = true
external_audio_manifests = ["configs/speech-manifold/wikimedia-pronunciations.jsonl"]
espeak_voices = ["en-us", "en-gb", "en-sc", "en-uk-north"]
google_translate_speeds = [1.0, 0.85, 0.7]

[train]
learning_rate = 0.0003
weight_decay = 0.0001
dropout = 0.1
epochs = 20
patience = 5
batch_size = 64
seed = 0
